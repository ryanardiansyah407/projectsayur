<!DOCTYPE html>
<html lang="id">
<head>
<link rel="manifest" href="/manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRANSAKSI SFB</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f6f8;
}
header{
  background:#111;
  color:#fff;
  padding:16px;
}
main{
  max-width:900px;
  margin:auto;
  padding:16px;
}
.card{
  background:#fff;
  padding:16px;
  border-radius:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  margin-bottom:16px;
}
input,select,button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}
button{
  background:#111;
  color:#fff;
  border:none;
  cursor:pointer;
}
button:hover{opacity:.9}
.hide{display:none}
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.bigBtn{
  padding:18px;
  font-size:16px;
  font-weight:bold;
}
#hasil{
  min-height:28px;
}
</style>
</head>

<body>

<header>
<h2>TRANSAKSI SAYUR FRESHMART BANDUNG</h2>
</header>

<main>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>Login</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">🔐 LOGIN</button>
<div id="loginMsg"></div>
</div>

<!-- APP -->
<div id="appBox" class="hide">

<div class="card">
<div id="userInfo"></div>
<button onclick="logout()">🚪 Logout</button>
</div>

<!-- ADMIN -->
<div id="adminPage" class="hide">

<div class="card">
<h3>Dashboard Admin PR BELUM SELESAI</h3>

<!-- 
<div class="grid2">
<button class="bigBtn" onclick="menuUser()">👥 USER</button>
<button class="bigBtn" onclick="menuStok()">📦 STOK</button>
<button class="bigBtn" onclick="menuLaporan()">📄 LAPORAN</button>
<button class="bigBtn" onclick="menuSetting()">⚙️ SETTING</button>
</div> 
-->


</div>

<div class="card">
<h3>Scan Barang Admin</h3>

<input id="barcodeAdmin" placeholder="Scan barcode">
<input id="qtyAdmin" type="number" value="1">

<select id="jenisAdmin">
<option>MASUK</option>
<option>KELUAR</option>
</select>

<div id="readerAdmin"></div>

<button onclick="scanAdmin()">📷 Scan Kamera</button>
<button onclick="toggleAutoAdmin()" id="autoBtnAdmin">AUTO OFF</button>
<button onclick="simpanAdmin()">💾 SIMPAN</button>

</div>

</div>

<!-- STAFF -->
<div id="staffPage" class="hide">

<div class="card">
<h3>Staff - Transaksi Keluar</h3>

<input id="barcodeStaff" placeholder="Scan barcode">
<input id="qtyStaff" type="number" value="1">

<input value="KELUAR" readonly>

<div id="readerStaff"></div>

<button class="bigBtn" onclick="scanStaff()">📷 Scan HP</button>
<button class="bigBtn" onclick="toggleAutoStaff()" id="autoBtnStaff">AUTO OFF</button>
<button class="bigBtn" onclick="simpanStaff()">💾 SIMPAN</button>

</div>

</div>

<div class="card">
<h3>Info</h3>
<div id="hasil">Belum ada data</div>
</div>

</div>

</main>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwWnCgc6aeeXZM0exdFKJBTns8UzrKA8kK0UVVDBtw1eoLy8-_CFJJBVGnM-FIAmzo1/exec";

let sesi=null;
let scanner=null;
let idleTimer=null;

let autoAdmin=false;
let autoStaff=false;

let lastScan="";
let lastTime=0;
let scanLock=false;

let currentMode=""; // admin / staff

const IDLE=10*60*1000;

/* START */
window.onload=function(){
 const s=sessionStorage.getItem("loginUser");
 if(s){
   sesi=JSON.parse(s);
   bukaApp();
 }else{
   username.focus();
 }
}

/* LOGIN */
async function login(){

 loginMsg.innerHTML="Loading...";

 try{
  const r=await fetch(API_URL,{
   method:"POST",
   body:JSON.stringify({
    action:"login",
    username:username.value.trim(),
    password:password.value.trim()
   })
  });

  const j=await r.json();

  if(j.status=="ok"){
   sesi=j;
   sessionStorage.setItem("loginUser",JSON.stringify(j));
   bukaApp();
  }else{
   loginMsg.innerHTML="❌ Login gagal";
   beepError();
  }

 }catch(e){
  loginMsg.innerHTML="❌ "+e.message;
  beepError();
 }
}

/* OPEN */
function bukaApp(){

 loginBox.classList.add("hide");
 appBox.classList.remove("hide");

 userInfo.innerHTML="👤 "+sesi.nama+" | "+sesi.role;

 if(sesi.role.toLowerCase()=="admin"){
   adminPage.classList.remove("hide");
   staffPage.classList.add("hide");
   barcodeAdmin.focus();
 }else{
   staffPage.classList.remove("hide");
   adminPage.classList.add("hide");
   barcodeStaff.focus();
 }

 resetIdle();
}

/* LOGOUT */
function logout(){
 sessionStorage.removeItem("loginUser");
 stopScan();
 location.reload();
}

/* IDLE */
function resetIdle(){
 clearTimeout(idleTimer);
 idleTimer=setTimeout(()=>{
   alert("Logout otomatis 10 menit");
   logout();
 },IDLE);
}

/* SOUND */
function beepSuccess(){
 const ctx=new (window.AudioContext||window.webkitAudioContext)();
 const o=ctx.createOscillator();
 o.type="sine";
 o.frequency.value=900;
 o.connect(ctx.destination);
 o.start();
 setTimeout(()=>o.stop(),100);
}

function beepError(){
 const ctx=new (window.AudioContext||window.webkitAudioContext)();
 const o=ctx.createOscillator();
 o.type="square";
 o.frequency.value=220;
 o.connect(ctx.destination);
 o.start();
 setTimeout(()=>o.stop(),180);
}

/* DOUBLE */
function isDoubleScan(code){
 const now=Date.now();

 if(code===lastScan && (now-lastTime)<1800){
   return true;
 }

 lastScan=code;
 lastTime=now;
 return false;
}

/* SAVE */
async function simpan(barcode,qty,jenis){

 if(scanLock)return;

 if(!barcode){
   hasil.innerHTML="❌ Barcode kosong";
   beepError();
   return;
 }

 scanLock=true;
 hasil.innerHTML="Menyimpan...";

 try{

  const r=await fetch(API_URL,{
   method:"POST",
   body:JSON.stringify({
    action:"scan",
    barcode:barcode,
    qty:qty,
    jenis:jenis,
    user:sesi.username,
    role:sesi.role
   })
  });

  const j=await r.json();

 if(j.status=="ok"){
  hasil.innerHTML="✔ Tersimpan";
  beepSuccess();
}else{
  hasil.innerHTML="❌ "+j.msg; // <<<<<< INI PENTING
  beepError();
}

 }catch(e){
  hasil.innerHTML="❌ "+e.message;
  beepError();
 }

 setTimeout(()=>{
   scanLock=false;
 },1000);

 resetIdle();
}

/* ADMIN SAVE */
function simpanAdmin(){
 simpan(barcodeAdmin.value.trim(),qtyAdmin.value,jenisAdmin.value);
 barcodeAdmin.value="";
 qtyAdmin.value=1;
 barcodeAdmin.focus();
}

/* STAFF SAVE */
function simpanStaff(){
 simpan(barcodeStaff.value.trim(),qtyStaff.value,"KELUAR");
 barcodeStaff.value="";
 qtyStaff.value=1;
 barcodeStaff.focus();
}

/* STOP CAMERA */
function stopScan(){
 if(scanner){
   scanner.stop().catch(()=>{});
   scanner=null;
 }
}

/* AUTO REOPEN */
function reopenCamera(){
 setTimeout(()=>{
   if(currentMode=="admin" && autoAdmin){
     scanAdmin();
   }
   if(currentMode=="staff" && autoStaff){
     scanStaff();
   }
 },1000);
}

/* ADMIN CAMERA */
function scanAdmin(){

 currentMode="admin";
 stopScan();

 scanner=new Html5Qrcode("readerAdmin");

 scanner.start(
  {facingMode:"environment"},
  {fps:20,qrbox:220},
  txt=>{

   if(isDoubleScan(txt)) return;

   barcodeAdmin.value=txt;
   hasil.innerHTML="✔ Scan Admin: "+txt;

   stopScan();

   if(autoAdmin){
     simpanAdmin();
     reopenCamera();
   }

  }
 );
}

/* STAFF CAMERA */
function scanStaff(){

 currentMode="staff";
 stopScan();

 scanner=new Html5Qrcode("readerStaff");

 scanner.start(
  {facingMode:"environment"},
  {fps:20,qrbox:220},
  txt=>{

   if(isDoubleScan(txt)) return;

   barcodeStaff.value=txt;
   hasil.innerHTML="✔ Scan Staff: "+txt;

   stopScan();

   if(autoStaff){
     simpanStaff();
     reopenCamera();
   }

  }
 );
}

/* AUTO */
function toggleAutoAdmin(){
 autoAdmin=!autoAdmin;
 autoBtnAdmin.innerHTML=autoAdmin?"AUTO ON":"AUTO OFF";
}

function toggleAutoStaff(){
 autoStaff=!autoStaff;
 autoBtnStaff.innerHTML=autoStaff?"AUTO ON":"AUTO OFF";
}

/* USB */
barcodeAdmin.addEventListener("keydown",function(e){
 if(e.key==="Enter"){
   e.preventDefault();
   simpanAdmin();
 }
});

barcodeStaff.addEventListener("keydown",function(e){
 if(e.key==="Enter"){
   e.preventDefault();
   simpanStaff();
 }
});

/* DASHBOARD */
function menuUser(){hasil.innerHTML="👥 USER aktif";}
function menuStok(){hasil.innerHTML="📦 STOK aktif";}
function menuLaporan(){hasil.innerHTML="📄 LAPORAN aktif";}
function menuSetting(){hasil.innerHTML="⚙️ SETTING aktif";}

/* ACTIVITY */
["click","keydown","touchstart"].forEach(evt=>{
 document.addEventListener(evt,resetIdle);
});
</script>

</body>
</html>
