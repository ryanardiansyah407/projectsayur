<!DOCTYPE html>
<html lang="id">
<head>
<link rel="manifest" href="/manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRANSAKSI SFB</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f6f8;
}
header{
  background:#111;
  color:#fff;
  padding:16px;
}
main{
  max-width:900px;
  margin:auto;
  padding:16px;
}
.card{
  background:#fff;
  padding:16px;
  border-radius:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  margin-bottom:16px;
}
input,select,button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}
button{
  background:#111;
  color:#fff;
  border:none;
  cursor:pointer;
}
button:hover{opacity:.9}
.hide{display:none}
#hasil{min-height:28px}
</style>
</head>

<body>

<header>
<h2>TRANSAKSI SFB</h2>
</header>

<main>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>Login</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">LOGIN</button>
<div id="loginMsg"></div>
</div>

<!-- APP -->
<div id="appBox" class="hide">

<div class="card">
<div id="userInfo"></div>
<button onclick="logout()">Logout</button>
</div>

<!-- ADMIN -->
<div id="adminPage" class="hide">
<div class="card">
<h3>ADMIN</h3>

<input id="barcodeAdmin" placeholder="Barcode">
<input id="qtyAdmin" type="number" value="1">

<select id="jenisAdmin">
<option value="MASUK">MASUK</option>
<option value="KELUAR">KELUAR</option>
</select>

<button onclick="scanAdmin()">SCAN</button>
<button onclick="simpanAdmin()">SIMPAN</button>

<div id="readerAdmin"></div>
</div>
</div>

<!-- STAFF -->
<div id="staffPage" class="hide">
<div class="card">
<h3>STAFF (KELUAR SAJA)</h3>

<input id="barcodeStaff" placeholder="Barcode">
<input id="qtyStaff" type="number" value="1">

<button onclick="scanStaff()">SCAN</button>
<button onclick="simpanStaff()">SIMPAN</button>

<div id="readerStaff"></div>
</div>
</div>

<div class="card">
<h3>INFO</h3>
<div id="hasil">Siap</div>
</div>

</div>

</main>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxzW8ekQJq4hQ2yR7q94r2PnDwF64WIxbj7HCUL-ihuZg3esedTpsk59w3Xxqs2arF8/exec";

let sesi=null;
let scanner=null;
let scanLock=false;

/* LOGIN */
async function login(){

 loginMsg.innerHTML="Loading...";

 try{
  const r=await fetch(API_URL,{
   method:"POST",
   body:JSON.stringify({
    action:"login",
    username:username.value.trim(),
    password:password.value.trim()
   })
  });

  const j=await r.json();

  if(j.status=="ok"){
   sesi=j;
   sessionStorage.setItem("loginUser",JSON.stringify(j));
   bukaApp();
  }else{
   loginMsg.innerHTML="❌ "+j.msg;
  }

 }catch(e){
  loginMsg.innerHTML="❌ "+e.message;
 }
}

/* OPEN */
function bukaApp(){

 loginBox.classList.add("hide");
 appBox.classList.remove("hide");

 userInfo.innerHTML="User: "+sesi.nama+" | "+sesi.role;

 if(sesi.role.toLowerCase()=="admin"){
   adminPage.classList.remove("hide");
   staffPage.classList.add("hide");
 }else{
   staffPage.classList.remove("hide");
   adminPage.classList.add("hide");
 }
}

/* LOGOUT */
function logout(){
 sessionStorage.removeItem("loginUser");
 location.reload();
}

/* SAVE CORE */
async function simpan(barcode,qty,jenis){

 if(scanLock)return;

 barcode=barcode.trim();
 qty=Number(qty);
 jenis=(jenis||"").toUpperCase();

 if(!barcode){
  hasil.innerHTML="❌ Barcode kosong";
  return;
 }

 if(isNaN(qty)||qty<=0){
  hasil.innerHTML="❌ Qty tidak valid";
  return;
 }

 scanLock=true;
 hasil.innerHTML="Menyimpan...";

 try{

  const r=await fetch(API_URL,{
   method:"POST",
   body:JSON.stringify({
    action:"scan",
    barcode:barcode,
    qty:qty,
    jenis:jenis,
    user:sesi.username,
    role:sesi.role
   })
  });

  const j=await r.json();

  console.log(j);

  if(j.status=="ok"){
   hasil.innerHTML="✔ OK stok: "+j.stok;
  }else{
   hasil.innerHTML="❌ "+j.msg;
   return;
  }

 }catch(e){
  hasil.innerHTML="❌ "+e.message;
 }

 setTimeout(()=>scanLock=false,800);
}

/* ADMIN */
function simpanAdmin(){
 simpan(
  barcodeAdmin.value,
  qtyAdmin.value,
  jenisAdmin.value
 );

 barcodeAdmin.value="";
 qtyAdmin.value=1;
 barcodeAdmin.focus();
}

/* STAFF (KELUAR ONLY) */
function simpanStaff(){
 simpan(
  barcodeStaff.value,
  qtyStaff.value,
  "KELUAR"
 );

 barcodeStaff.value="";
 qtyStaff.value=1;
 barcodeStaff.focus();
}

/* CAMERA SIMPLE */
function scanAdmin(){
 hasil.innerHTML="SCAN ADMIN aktif";
}

function scanStaff(){
 hasil.innerHTML="SCAN STAFF aktif";
}

</script>

</body>
</html>
