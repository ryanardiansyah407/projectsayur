<!DOCTYPE html>
<html lang="id">
<head>
<link rel="manifest" href="/manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRANSAKSI SFB</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f6f8;
}
header{
  background:#111;
  color:#fff;
  padding:16px;
}
main{
  max-width:900px;
  margin:auto;
  padding:16px;
}
.card{
  background:#fff;
  padding:16px;
  border-radius:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  margin-bottom:16px;
}
input,select,button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}
button{
  background:#111;
  color:#fff;
  border:none;
  cursor:pointer;
}
button:hover{opacity:.9}
.hide{display:none}
</style>
</head>

<body>

<header>
<h2>TRANSAKSI SFB</h2>
</header>

<main>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>Login</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">LOGIN</button>
<div id="loginMsg"></div>
</div>

<!-- APP -->
<div id="appBox" class="hide">

<div class="card">
<div id="userInfo"></div>
<button onclick="logout()">Logout</button>
</div>

<!-- ADMIN -->
<div id="adminPage" class="hide">
<div class="card">
<h3>ADMIN</h3>

<input id="barcodeAdmin" placeholder="Barcode">
<input id="qtyAdmin" type="number" value="1">

<select id="jenisAdmin">
<option value="MASUK">MASUK</option>
<option value="KELUAR">KELUAR</option>
</select>

<button onclick="scanAdmin()">SCAN</button>
<button onclick="simpanAdmin()">SIMPAN</button>

</div>
</div>

<!-- STAFF -->
<div id="staffPage" class="hide">
<div class="card">
<h3>STAFF (KELUAR SAJA)</h3>

<input id="barcodeStaff" placeholder="Barcode">
<input id="qtyStaff" type="number" value="1">

<button onclick="scanStaff()">SCAN</button>
<button onclick="simpanStaff()">SIMPAN</button>

</div>
</div>

<div class="card">
<h3>INFO</h3>
<div id="hasil">Siap</div>
</div>

</div>

</main>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxLSrx3470ahsvwHr8d508vUBwhfOX0hOgA4As5Ka4UKJZGv9bVEKGB2yAQ73W63aAy/exec";

/* DOM SAFE BIND */
const username = document.getElementById("username");
const password = document.getElementById("password");

const loginBox = document.getElementById("loginBox");
const appBox = document.getElementById("appBox");
const adminPage = document.getElementById("adminPage");
const staffPage = document.getElementById("staffPage");
const userInfo = document.getElementById("userInfo");

const barcodeAdmin = document.getElementById("barcodeAdmin");
const qtyAdmin = document.getElementById("qtyAdmin");
const jenisAdmin = document.getElementById("jenisAdmin");

const barcodeStaff = document.getElementById("barcodeStaff");
const qtyStaff = document.getElementById("qtyStaff");

const hasil = document.getElementById("hasil");
const loginMsg = document.getElementById("loginMsg");

let sesi=null;
let scanLock=false;

/* LOGIN */
async function login(){

 loginMsg.innerHTML="Loading...";

 try{
  const r=await fetch(API_URL,{
   method:"POST",
   body:JSON.stringify({
    action:"login",
    username: username.value.trim(),
    password: password.value.trim()
   })
  });

  const j=await r.json();

  if(j.status=="ok"){
   sesi=j;
   sessionStorage.setItem("loginUser",JSON.stringify(j));
   bukaApp();
  }else{
   loginMsg.innerHTML="❌ "+j.msg;
  }

 }catch(e){
  loginMsg.innerHTML="❌ "+e.message;
 }
}

/* OPEN APP */
function bukaApp(){

 loginBox.classList.add("hide");
 appBox.classList.remove("hide");

 userInfo.innerHTML="User: "+sesi.nama+" | "+sesi.role;

 if(sesi.role.toLowerCase()=="admin"){
   adminPage.classList.remove("hide");
   staffPage.classList.add("hide");
 }else{
   staffPage.classList.remove("hide");
   adminPage.classList.add("hide");
 }
}

/* LOGOUT */
function logout(){
 sessionStorage.removeItem("loginUser");
 location.reload();
}

/* CORE SAVE */
async function simpan(barcode,qty,jenis){

 if(scanLock) return;

 barcode=(barcode||"").trim();
 qty=Number(qty);
 jenis=(jenis||"").toUpperCase();

 if(!barcode){
  hasil.innerHTML="❌ Barcode kosong";
  return;
 }

 if(isNaN(qty) || qty<=0){
  hasil.innerHTML="❌ Qty tidak valid";
  return;
 }

 scanLock=true;
 hasil.innerHTML="Menyimpan...";

 try{
  const r=await fetch(API_URL,{
   method:"POST",
   body:JSON.stringify({
    action:"scan",
    barcode,
    qty,
    jenis,
    user:sesi.username,
    role:sesi.role
   })
  });

  const j=await r.json();

  if(j.status=="ok"){
   hasil.innerHTML="✔️ OK | stok: "+j.stok;
  }else{
   hasil.innerHTML="❌ "+j.msg;
  }

 }catch(e){
  hasil.innerHTML="❌ "+e.message;
 }

 setTimeout(()=>scanLock=false,800);
}

/* ADMIN */
function simpanAdmin(){

 const bc = document.getElementById("barcodeAdmin").value;
 const qty = document.getElementById("qtyAdmin").value;
 const jenis = document.getElementById("jenisAdmin").value;

 console.log("DEBUG ADMIN:", bc, qty, jenis);

 if(!bc || bc.trim()===""){
  hasil.innerHTML="❌ Barcode masih kosong (cek input)";
  return;
 }

 simpan(bc, qty, jenis);

 document.getElementById("barcodeAdmin").value="";
 document.getElementById("qtyAdmin").value=1;
 document.getElementById("barcodeAdmin").focus();
}

/* STAFF */
function simpanStaff(){

 const bc = document.getElementById("barcodeStaff").value;
 const qty = document.getElementById("qtyStaff").value;

 if(!bc || bc.trim()===""){
  hasil.innerHTML="❌ Barcode masih kosong (staff)";
  return;
 }

 simpan(bc, qty, "KELUAR");

 document.getElementById("barcodeStaff").value="";
 document.getElementById("qtyStaff").value=1;
 document.getElementById("barcodeStaff").focus();
}

/* SCAN PLACEHOLDER */
function scanAdmin(){
 hasil.innerHTML="📷 Scanner admin ready";
}
function scanStaff(){
 hasil.innerHTML="📷 Scanner staff ready";
}

</script>

</body>
</html>
