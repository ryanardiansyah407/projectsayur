<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRANSAKSI SFB</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f8}
header{background:#111;color:#fff;padding:16px}
main{max-width:800px;margin:auto;padding:16px}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px}
input,select,button{width:100%;padding:10px;margin:6px 0}
button{background:#111;color:#fff;border:none}
.hide{display:none}
</style>
</head>

<body>

<header>TRANSAKSI SFB</header>

<main>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>Login</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">LOGIN</button>
<div id="loginMsg"></div>
</div>

<!-- APP -->
<div id="appBox" class="hide">

<div class="card">
<div id="userInfo"></div>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>TRANSAKSI</h3>

<input id="barcode" placeholder="Barcode">
<input id="qty" type="number" value="1">

<select id="jenis">
<option value="MASUK">MASUK</option>
<option value="KELUAR">KELUAR</option>
</select>

<button onclick="simpan()">SIMPAN</button>

</div>

<div class="card">
<div id="hasil">Siap</div>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwpbyKs_riCiEk6b-Bux_yCUgJkjmiHWK1SZn5pP1HKGmexbb_OsnFIuNVD378jJBTY/exec";

let sesi = null;
let lock = false;

async function postData(payload){
  const r = await fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"text/plain;charset=utf-8"
    },
    body:JSON.stringify(payload)
  });

  const text = await r.text();
  console.log("RAW:", text);

  return JSON.parse(text);
}

/* LOGIN */
async function login(){

 loginMsg.innerHTML="Loading...";

 const j = await postData({
   action:"login",
   username:username.value.trim(),
   password:password.value.trim()
 });

 if(j.status=="ok"){
   sesi=j;
   buka();
 }else{
   loginMsg.innerHTML=j.msg;
 }
}

/* OPEN */
function buka(){
 loginBox.classList.add("hide");
 appBox.classList.remove("hide");
 userInfo.innerHTML = sesi.nama + " | " + sesi.role;
}

/* LOGOUT */
function logout(){
 location.reload();
}

/* SIMPAN */
async function simpan(){

 if(lock) return;
 lock = true;

 const j = await postData({
   action:"scan",
   barcode: barcode.value,
   qty: qty.value,
   jenis: jenis.value,
   user: sesi.username,
   role: sesi.role
 });

 if(j.status=="ok"){
   hasil.innerHTML="✔ OK stok: "+j.stok;
 }else{
   hasil.innerHTML="❌ "+j.msg;
 }

 setTimeout(()=>lock=false,800);
}

</script>

</body>
</html>
